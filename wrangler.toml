name = "worker-cms-plugin-google-sheet"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
# Base URL of the CMS Worker, for the /__cms page read/write API.
CMS_URL = "https://cms.eventuai.com"
#
# OPTIONAL — the manifest declares the "*" wildcard by default (one
# admin-approvable "all page types" grant per CMS; approval is still required
# in the CMS plugin management UI before the write-back API allows anything).
# Set a comma-separated list only to narrow the declaration so admins can
# approve individual page types instead of all-or-nothing. Also pre-fills the
# sync form's page-types field.
# SYNC_PAGE_TYPES = "guest, contact"
GOOGLE_PRIVATE_KEY_ID = "4966b94bf547ac00ffd52cb92367de70c5a5fe4b"
GOOGLE_SERVICE_ACCOUNT_EMAIL = "id-xcms-sheets-sync@xcms-500715.iam.gserviceaccount.com"
#
# Optional default language for localized lect columns.
# DEFAULT_LANGUAGE = "en"

# Secrets:
#   wrangler secret put PLUGIN_SECRET
#   wrangler secret put GOOGLE_SERVICE_ACCOUNT_EMAIL
#   wrangler secret put GOOGLE_PRIVATE_KEY
#   wrangler secret put SHEET_WEBHOOK_SECRET
#
# Share the target spreadsheet with GOOGLE_SERVICE_ACCOUNT_EMAIL, or let the
# plugin create a new spreadsheet owned by that service account.

# ── Multi-tenant mode (several CMS hosts → this one plugin) ────────────────────
# One record per connected CMS; per-tenant vars can override the Google
# credentials and SHEET_WEBHOOK_SECRET (recommended — a per-tenant webhook
# secret keeps callback tokens from ever verifying across tenants):
#   wrangler kv key put --binding TENANTS "tenant:https://cms1.example.com" \
#     '{"secret":"<32-byte hex>","vars":{"SHEET_WEBHOOK_SECRET":"<per-tenant secret>"}}'
[[kv_namespaces]]
binding = "TENANTS"
id = "a2540f49b2a645f884c2ac89292e7bdd"
